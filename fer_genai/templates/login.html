<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmotionAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .animate-slideIn {
            animation: slideIn 0.6s ease-out;
        }
        .input-focus:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-indigo-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-6xl grid md:grid-cols-2 gap-8 items-center">
        
        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 animate-slideIn">
            <div class="mb-8">
                <a href="/" class="inline-flex items-center space-x-2 text-indigo-600 hover:text-indigo-700 transition mb-6">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    <span class="font-medium">Back to Home</span>
                </a>
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                <p class="text-gray-600">Log in to continue your emotion journey</p>
            </div>

            {% if error %}
            <div class="mb-6 bg-red-50 border border-red-200 rounded-xl p-4 flex items-center space-x-3">
                <svg class="w-5 h-5 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-red-800">{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" 
                           name="email" 
                           required 
                           class="input-focus w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none transition"
                           placeholder="your.email@example.com">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <div class="relative">
                        <input type="password" 
                               id="password"
                               name="password" 
                               required 
                               class="input-focus w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none transition pr-12"
                               placeholder="Enter your password">
                        <button type="button" 
                                onclick="togglePassword()"
                                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 rounded-xl font-semibold text-lg hover:shadow-xl transition transform hover:scale-105">
                    Log In
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-600">
                    Don't have an account? 
                    <a href="/signup" class="text-indigo-600 font-semibold hover:text-indigo-700 transition">Sign up</a>
                </p>
            </div>
        </div>

        <div class="hidden md:block animate-slideIn">
            <div class="relative">
                <div class="absolute inset-0 bg-gradient-to-r from-purple-400 to-indigo-400 rounded-3xl blur-3xl opacity-30"></div>
                <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=600&h=700&fit=crop" 
                     alt="Login" 
                     class="relative rounded-3xl shadow-2xl w-full h-auto object-cover">
            </div>
            <div class="mt-8">
                <h2 class="text-3xl font-bold text-gray-900 mb-4">Continue Your Journey</h2>
                <p class="text-lg text-gray-600 leading-relaxed">Access your personalized emotion insights and recommendations.</p>
                <div class="mt-6 grid grid-cols-3 gap-4 text-center">
                    <div class="bg-white rounded-2xl p-4 shadow-lg">
                        <div class="text-3xl font-bold text-indigo-600">97%</div>
                        <div class="text-sm text-gray-600 mt-1">Accuracy</div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 shadow-lg">
                        <div class="text-3xl font-bold text-purple-600">7</div>
                        <div class="text-sm text-gray-600 mt-1">Emotions</div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 shadow-lg">
                        <div class="text-3xl font-bold text-blue-600">Fast</div>
                        <div class="text-sm text-gray-600 mt-1">Detection</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }
    </script>
</body>
</html>
