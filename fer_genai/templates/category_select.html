<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Category - EmotionAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .animate-scaleIn {
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-slideUp {
            animation: slideUp 0.6s ease-out forwards;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .animate-pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .category-btn {
            transition: all 0.3s ease;
        }
        .category-btn:hover {
            transform: translateY(-4px);
        }
        .category-btn:disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-indigo-50 min-h-screen">
    
    <nav class="bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">EmotionAI</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/upload" class="text-gray-700 hover:text-indigo-600 font-medium transition">New Detection</a>
                    <a href="/history" class="text-gray-700 hover:text-indigo-600 font-medium transition">History</a>
                    <a href="/logout" class="text-gray-700 hover:text-indigo-600 font-medium transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-12 animate-scaleIn">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-full mb-6">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="text-5xl font-bold text-gray-900 mb-4">Emotion Detected!</h1>
            <p class="text-2xl text-gray-600">We found your emotion is <span class="text-indigo-600 font-bold capitalize">{{ emotion }}</span></p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 mb-8 animate-slideUp">
            <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">What would you like recommendations for?</h2>
            
            <div class="grid md:grid-cols-3 gap-6">
                <!-- Songs Category -->
                <button class="category-btn group p-8 rounded-2xl border-2 border-gray-200 hover:border-purple-600 hover:shadow-xl transition-all duration-300" onclick="selectCategory('songs')" id="songs-btn">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900 mb-2">Songs</h3>
                    <p class="text-gray-600">Get song recommendations tailored to your mood</p>
                </button>

                <!-- Movies Category -->
                <button class="category-btn group p-8 rounded-2xl border-2 border-gray-200 hover:border-blue-600 hover:shadow-xl transition-all duration-300" onclick="selectCategory('movies')" id="movies-btn">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900 mb-2">Movies</h3>
                    <p class="text-gray-600">Discover movies that match your emotional state</p>
                </button>

                <!-- Books Category -->
                <button class="category-btn group p-8 rounded-2xl border-2 border-gray-200 hover:border-indigo-600 hover:shadow-xl transition-all duration-300" onclick="selectCategory('books')" id="books-btn">
                    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900 mb-2">Books</h3>
                    <p class="text-gray-600">Find books to explore your current feelings</p>
                </button>
            </div>

            <div id="loading" class="hidden mt-8">
                <div class="text-center">
                    <div class="inline-flex items-center space-x-2">
                        <div class="w-4 h-4 bg-indigo-600 rounded-full animate-pulse-custom"></div>
                        <div class="w-4 h-4 bg-indigo-600 rounded-full animate-pulse-custom" style="animation-delay: 0.1s;"></div>
                        <div class="w-4 h-4 bg-indigo-600 rounded-full animate-pulse-custom" style="animation-delay: 0.2s;"></div>
                    </div>
                    <p class="text-gray-600 mt-4">Generating recommendations...</p>
                </div>
            </div>
        </div>

        <div class="flex justify-center">
            <a href="/upload" class="bg-gray-600 text-white px-8 py-4 rounded-xl font-semibold text-lg hover:bg-gray-700 transition">
                Back to Detection
            </a>
        </div>
    </div>

    <script>
        async function selectCategory(category) {
            // Disable all buttons
            document.getElementById('songs-btn').disabled = true;
            document.getElementById('movies-btn').disabled = true;
            document.getElementById('books-btn').disabled = true;
            
            // Show loading
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('/get_category_recommendations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        category: category
                    })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert('Error generating recommendations. Please try again.');
                    document.getElementById('songs-btn').disabled = false;
                    document.getElementById('movies-btn').disabled = false;
                    document.getElementById('books-btn').disabled = false;
                    document.getElementById('loading').classList.add('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
                document.getElementById('songs-btn').disabled = false;
                document.getElementById('movies-btn').disabled = false;
                document.getElementById('books-btn').disabled = false;
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
